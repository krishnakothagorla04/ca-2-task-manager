# ==============================================================
# Docker Compose — Local Development
# Run: docker-compose up --build
# ==============================================================
version: '3.8'

services:
  # ---- MongoDB ----
  mongodb:
    image: mongo:6
    container_name: taskmanager-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskmanager-net

  # ---- User Service ----
  user-service:
    build: ./user-service
    container_name: taskmanager-user-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
    depends_on:
      - mongodb
    networks:
      - taskmanager-net

  # ---- Task Service ----
  task-service:
    build: ./task-service
    container_name: taskmanager-task-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
      - USER_SERVICE_URL=http://user-service:3000
    depends_on:
      - mongodb
      - user-service
    networks:
      - taskmanager-net

volumes:
  mongo-data:

networks:
  taskmanager-net:
    driver: bridge
