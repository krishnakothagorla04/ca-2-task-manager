# ==============================================================
# Task Service — Deployment + Service + HPA (Auto-scaling)
# ==============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: taskmanager
  labels:
    app: task-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: YOUR_DOCKERHUB_USERNAME/task-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              value: "mongodb://mongodb.taskmanager.svc.cluster.local:27017/taskmanager"
            - name: USER_SERVICE_URL
              value: "http://user-service.taskmanager.svc.cluster.local:3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: taskmanager
spec:
  selector:
    app: task-service
  ports:
    - port: 3001
      targetPort: 3001
  type: NodePort
---
# ==============================================================
# HPA — Auto-scaling for task-service (Extra Feature)
# Scales between 2 and 5 replicas based on CPU utilization
# ==============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-service-hpa
  namespace: taskmanager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
