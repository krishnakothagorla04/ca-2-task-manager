# ==============================================================
# SonarCloud Configuration
# Required for automated code quality analysis in CI/CD
# ==============================================================
sonar.projectKey=krishnakothagorla04_ca-2-task-manager
sonar.organization=org-name
sonar.projectName=CA2 Task Manager

# Source directories — scan all application code from root
sonar.sources=.

# Exclusions (dependencies, coverage reports, non-code files)
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.md,**/*.pdf,**/*.yml,**/*.yaml,**/*.tf,**/*.properties,.github/**,k8s/**,terraform/**,.git/**

# Multi-language support (JS, HTML, CSS)
sonar.sourceEncoding=UTF-8

# Quality Gate — do not block pipeline on quality gate result
sonar.qualitygate.wait=false

# Coverage — no test framework configured yet, skip coverage metrics
sonar.coverage.exclusions=**/*

