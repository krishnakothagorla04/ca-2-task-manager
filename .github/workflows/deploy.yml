# ==============================================================
# CI/CD Pipeline — GitHub Actions
# Fully automated: Code push → Build → Scan → Push → Deploy
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token
# ==============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  USER_SERVICE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/user-service
  TASK_SERVICE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/task-service

jobs:
  # ============================================================
  # STAGE 1: Build & Test
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, task-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm test

  # ============================================================
  # STAGE 2: Docker Build + Security Scan + Push
  # ============================================================
  docker-build-scan-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: user-service
            image_env: USER_SERVICE_IMAGE
          - service: task-service
            image_env: TASK_SERVICE_IMAGE
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest \
                       ./${{ matrix.service }}

      # ── EXTRA FEATURE: Security Scanning with Trivy ──
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # Set to '1' to fail pipeline on vulnerabilities

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest

  # ============================================================
  # STAGE 3: Automated Local Deployment (Ephemeral Cluster)
  # ============================================================
  deploy:
    name: Local CI Deployment Test
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create local k8s cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: local-ci-cluster

      - name: Wait for cluster to be ready
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply (Automated IaC)
        working-directory: ./terraform
        env:
          KUBE_CONFIG_PATH: ~/.kube/config
        run: |
          terraform apply -auto-approve -var="dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/mongodb -n taskmanager --timeout=120s
          kubectl rollout status deployment/user-service -n taskmanager --timeout=120s
          kubectl rollout status deployment/task-service -n taskmanager --timeout=120s
          echo "✅ All deployments rolled out successfully on local CI cluster!"

      - name: Display final cluster state
        run: |
          kubectl get all -n taskmanager
