<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager — CA2 Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 24px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .badge {
      background: rgba(102, 126, 234, 0.15);
      color: #667eea;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ── Layout ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* ── Cards ── */
    .card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 28px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.1);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .icon { font-size: 1.3rem; }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #667eea;
    }
    textarea { resize: vertical; min-height: 60px; }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 8px;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #0f0f1a;
      box-shadow: 0 4px 16px rgba(56, 239, 125, 0.2);
    }

    /* ── Lists ── */
    .full-width { grid-column: 1 / -1; }
    .list { margin-top: 12px; }
    .list-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .list-item:hover { background: rgba(255,255,255,0.06); }
    .list-item .info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .list-item .info p {
      font-size: 0.8rem;
      color: #888;
      margin-top: 3px;
    }
    .list-item .actions { display: flex; gap: 8px; align-items: center; }
    .list-item .actions select {
      width: auto;
      padding: 6px 10px;
      font-size: 0.78rem;
    }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-pending    { background: rgba(255,193,7,0.15); color: #ffc107; }
    .status-in-progress { background: rgba(33,150,243,0.15); color: #2196f3; }
    .status-completed  { background: rgba(56,239,125,0.15); color: #38ef7d; }

    .delete-btn {
      background: rgba(244,67,54,0.1);
      color: #f44336;
      border: 1px solid rgba(244,67,54,0.2);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      width: auto;
      margin: 0;
    }

    .empty-msg {
      text-align: center;
      color: #555;
      padding: 30px;
      font-size: 0.9rem;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #0f0f1a; }
    .toast.error   { background: linear-gradient(135deg, #f44336, #e91e63); }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>📋 Task Manager</h1>
    <span class="badge">MICROSERVICES DEMO</span>
  </header>

  <div class="container">
    <!-- Create User -->
    <div class="card">
      <h2><span class="icon">👤</span> Create User</h2>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="userName" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="userEmail" placeholder="john@example.com" />
      </div>
      <button class="btn-primary" onclick="createUser()">Create User</button>
    </div>

    <!-- Create Task -->
    <div class="card">
      <h2><span class="icon">✅</span> Create Task</h2>
      <div class="form-group">
        <label>Assign to User</label>
        <select id="taskUserId">
          <option value="">— Select a user —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="taskTitle" placeholder="Fix login bug" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="taskDesc" placeholder="Details about the task..."></textarea>
      </div>
      <button class="btn-success" onclick="createTask()">Create Task</button>
    </div>

    <!-- Users List -->
    <div class="card">
      <h2><span class="icon">👥</span> Users</h2>
      <div id="usersList" class="list">
        <p class="empty-msg">No users yet</p>
      </div>
    </div>

    <!-- Tasks List -->
    <div class="card">
      <h2><span class="icon">📝</span> Tasks</h2>
      <div id="tasksList" class="list">
        <p class="empty-msg">No tasks yet</p>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Configuration ──
    // Change these URLs based on your deployment
    const USER_API = 'http://localhost:3000';
    const TASK_API = 'http://localhost:3001';

    // ── Toast Notification ──
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Users ──
    async function loadUsers() {
      try {
        const res = await fetch(`${USER_API}/users`);
        const users = await res.json();
        const el = document.getElementById('usersList');
        const sel = document.getElementById('taskUserId');

        if (users.length === 0) {
          el.innerHTML = '<p class="empty-msg">No users yet</p>';
          sel.innerHTML = '<option value="">— Select a user —</option>';
          return;
        }

        el.innerHTML = users.map(u => `
          <div class="list-item">
            <div class="info">
              <h3>${u.name}</h3>
              <p>${u.email}</p>
            </div>
            <span style="color:#667eea;font-size:0.75rem;">${u._id.slice(-6)}</span>
          </div>
        `).join('');

        sel.innerHTML = '<option value="">— Select a user —</option>' +
          users.map(u => `<option value="${u._id}">${u.name} (${u.email})</option>`).join('');
      } catch (err) {
        console.error('Failed to load users', err);
      }
    }

    async function createUser() {
      const name = document.getElementById('userName').value.trim();
      const email = document.getElementById('userEmail').value.trim();
      if (!name || !email) return showToast('Name and email required', 'error');

      try {
        const res = await fetch(`${USER_API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        if (!res.ok) {
          const err = await res.json();
          return showToast(err.error || 'Failed', 'error');
        }
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        showToast('User created!');
        loadUsers();
      } catch (err) {
        showToast('Cannot reach user-service', 'error');
      }
    }

    // ── Tasks ──
    async function loadTasks() {
      try {
        const res = await fetch(`${TASK_API}/tasks`);
        const tasks = await res.json();
        const el = document.getElementById('tasksList');

        if (tasks.length === 0) {
          el.innerHTML = '<p class="empty-msg">No tasks yet</p>';
          return;
        }

        el.innerHTML = tasks.map(t => `
          <div class="list-item">
            <div class="info">
              <h3>${t.title}</h3>
              <p>${t.description || 'No description'}</p>
            </div>
            <div class="actions">
              <span class="status-badge status-${t.status}">${t.status}</span>
              <select onchange="updateStatus('${t._id}', this.value)">
                <option value="pending"     ${t.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="in-progress" ${t.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                <option value="completed"   ${t.status === 'completed' ? 'selected' : ''}>Completed</option>
              </select>
              <button class="delete-btn" onclick="deleteTask('${t._id}')">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load tasks', err);
      }
    }

    async function createTask() {
      const userId = document.getElementById('taskUserId').value;
      const title = document.getElementById('taskTitle').value.trim();
      const description = document.getElementById('taskDesc').value.trim();
      if (!userId || !title) return showToast('Select user and enter title', 'error');

      try {
        const res = await fetch(`${TASK_API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, title, description })
        });
        if (!res.ok) {
          const err = await res.json();
          return showToast(err.error || 'Failed', 'error');
        }
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        showToast('Task created!');
        loadTasks();
      } catch (err) {
        showToast('Cannot reach task-service', 'error');
      }
    }

    async function updateStatus(id, status) {
      try {
        await fetch(`${TASK_API}/tasks/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        showToast(`Status → ${status}`);
        loadTasks();
      } catch (err) {
        showToast('Update failed', 'error');
      }
    }

    async function deleteTask(id) {
      try {
        await fetch(`${TASK_API}/tasks/${id}`, { method: 'DELETE' });
        showToast('Task deleted');
        loadTasks();
      } catch (err) {
        showToast('Delete failed', 'error');
      }
    }

    // ── Init ──
    loadUsers();
    loadTasks();
  </script>
</body>
</html>
