<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager — Persistent Auth Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 24px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .user-profile {
      display: none;
      align-items: center;
      gap: 15px;
    }
    .user-profile span {
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ── Layout & Cards ── */
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      width: 100%;
    }
    .card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .card h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 25px;
      color: #fff;
      text-align: center;
    }

    /* ── Screens ── */
    #authScreen { display: block; max-width: 450px; margin: 60px auto; }
    #dashboardScreen { display: none; }
    .toggle-text {
      text-align: center; margin-top: 20px; font-size: 0.85rem; color: #888;
    }
    .toggle-text a { color: #667eea; cursor: pointer; text-decoration: none; font-weight: 600; }
    .toggle-text a:hover { text-decoration: underline; }

    /* ── Forms ── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.8rem; font-weight: 500; color: #888;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    input, select, textarea {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: #e0e0e0; font-family: 'Inter', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #667eea; }
    textarea { resize: vertical; min-height: 80px; }

    button {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: 10px;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e, #38ef7d); color: #0f0f1a;
      box-shadow: 0 4px 16px rgba(56, 239, 125, 0.2);
    }
    .btn-logout {
      width: auto; padding: 8px 16px; font-size: 0.8rem; background: rgba(244,67,54,0.1);
      color: #f44336; border: 1px solid rgba(244,67,54,0.2); box-shadow: none; margin: 0;
    }

    /* ── Dashboard Grid ── */
    .dashboard-grid {
      display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px;
    }

    /* ── Tasks List ── */
    .list { margin-top: 15px; }
    .list-item {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 18px 22px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .list-item:hover { background: rgba(255,255,255,0.06); }
    .list-item .info h3 { font-size: 1rem; font-weight: 600; color: #fff; }
    .list-item .info p { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
    .list-item .actions { display: flex; gap: 10px; align-items: center; }
    .list-item .actions select { width: auto; padding: 8px 12px; font-size: 0.8rem; }

    .status-badge {
      font-size: 0.75rem; font-weight: 600; padding: 6px 12px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-pending    { background: rgba(255,193,7,0.15); color: #ffc107; }
    .status-in-progress { background: rgba(33,150,243,0.15); color: #2196f3; }
    .status-completed  { background: rgba(56,239,125,0.15); color: #38ef7d; }

    .delete-btn {
      background: rgba(244,67,54,0.1); color: #f44336; border: 1px solid rgba(244,67,54,0.2);
      padding: 8px 14px; border-radius: 8px; font-size: 0.8rem; width: auto; margin: 0;
    }
    .empty-msg { text-align: center; color: #777; padding: 40px; font-size: 0.95rem; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 14px 24px;
      border-radius: 12px; font-size: 0.85rem; font-weight: 500; color: #fff;
      opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #0f0f1a; }
    .toast.error   { background: linear-gradient(135deg, #f44336, #e91e63); }
  </style>
</head>
<body>
  
  <header>
    <h1>📋 Task Manager</h1>
    <div id="userProfile" class="user-profile">
      <span id="welcomeMsg">Welcome, User</span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <!-- ==================== AUTH SCREEN ==================== -->
  <div id="authScreen" class="container">
    <div class="card">
      <h2 id="authTitle">Sign In to Task Manager</h2>
      
      <!-- Only shown on signup -->
      <div class="form-group" id="nameGroup" style="display:none;">
        <label>Full Name</label>
        <input type="text" id="authName" placeholder="John Doe" />
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="authEmail" placeholder="john@example.com" />
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="authPassword" placeholder="••••••••" />
      </div>
      
      <button class="btn-primary" id="authBtn" onclick="handleAuth()">Sign In</button>
      
      <p class="toggle-text" id="toggleAuthText">
        Don't have an account? <a onclick="toggleAuthMode()">Sign up here</a>
      </p>
    </div>
  </div>

  <!-- ==================== DASHBOARD SCREEN ==================== -->
  <div id="dashboardScreen" class="container" style="max-width: 1200px;">
    <div class="dashboard-grid">
      
      <!-- Create Task -->
      <div class="card" style="align-self: start;">
        <h2 style="text-align: left;">➕ New Task</h2>
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" id="taskTitle" placeholder="What needs to be done?" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="taskDesc" placeholder="Any extra details..."></textarea>
        </div>
        <button class="btn-success" onclick="createTask()">Create Task</button>
      </div>

      <!-- Isolated Tasks List -->
      <div class="card">
        <h2 style="text-align: left;">📝 My Tasks</h2>
        <div id="tasksList" class="list">
          <p class="empty-msg">Loading tasks...</p>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    const USER_API = 'http://localhost:3000';
    const TASK_API = 'http://localhost:3001';

    // ── State Management ──
    let isSignupMode = false;
    let currentUser = null; // { _id, name, email }

    // ── Toast Notification ──
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Initialization ──
    window.onload = () => {
      // Check persistency by reading localStorage
      const savedUser = localStorage.getItem('taskManagerUser');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showDashboard();
      } else {
        showAuth();
      }
    };

    // ── UI Toggles ──
    function showAuth() {
      document.getElementById('authScreen').style.display = 'block';
      document.getElementById('dashboardScreen').style.display = 'none';
      document.getElementById('userProfile').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      document.getElementById('userProfile').style.display = 'flex';
      document.getElementById('welcomeMsg').textContent = `Welcome, ${currentUser.name}`;
      loadIsolatedTasks();
    }

    function toggleAuthMode() {
      isSignupMode = !isSignupMode;
      document.getElementById('nameGroup').style.display = isSignupMode ? 'block' : 'none';
      document.getElementById('authTitle').textContent = isSignupMode ? 'Create an Account' : 'Sign In to Task Manager';
      document.getElementById('authBtn').textContent = isSignupMode ? 'Sign Up' : 'Sign In';
      document.getElementById('toggleAuthText').innerHTML = isSignupMode 
        ? `Already have an account? <a onclick="toggleAuthMode()">Sign in here</a>`
        : `Don't have an account? <a onclick="toggleAuthMode()">Sign up here</a>`;
    }

    function logout() {
      localStorage.removeItem('taskManagerUser');
      currentUser = null;
      document.getElementById('authEmail').value = '';
      document.getElementById('authPassword').value = '';
      showToast('Logged out securely!');
      showAuth();
    }

    // ── Authentication API ──
    async function handleAuth() {
      const name = document.getElementById('authName').value.trim();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;

      if (!email || !password) return showToast('Email and password required', 'error');
      if (isSignupMode && !name) return showToast('Name is required for signup', 'error');

      const url = isSignupMode ? `${USER_API}/users` : `${USER_API}/users/login`;
      const body = isSignupMode ? { name, email, password } : { email, password };

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        const data = await res.json();
        
        if (!res.ok) return showToast(data.error || 'Authentication failed', 'error');
        
        // Save persistency
        currentUser = data;
        localStorage.setItem('taskManagerUser', JSON.stringify(currentUser));
        
        showToast(isSignupMode ? 'Account created successfully!' : 'Signed in successfully!');
        showDashboard();
      } catch (err) {
        showToast('Cannot connect to user-service', 'error');
      }
    }

    // ── Tasks API (ISOLATED) ──
    async function loadIsolatedTasks() {
      if (!currentUser) return;
      
      try {
        // DATA ISOLATION: Explicitly request ONLY tasks belonging to currentUser._id
        const res = await fetch(`${TASK_API}/tasks?userId=${currentUser._id}`);
        const tasks = await res.json();
        const el = document.getElementById('tasksList');

        if (tasks.length === 0) {
          el.innerHTML = '<p class="empty-msg">You have no tasks! Create one on the left.</p>';
          return;
        }

        el.innerHTML = tasks.map(t => `
          <div class="list-item">
            <div class="info">
              <h3>${t.title}</h3>
              <p>${t.description || 'No description'}</p>
            </div>
            <div class="actions">
              <span class="status-badge status-${t.status}">${t.status}</span>
              <select onchange="updateTaskStatus('${t._id}', this.value)">
                <option value="pending"     ${t.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="in-progress" ${t.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                <option value="completed"   ${t.status === 'completed' ? 'selected' : ''}>Completed</option>
              </select>
              <button class="delete-btn" onclick="deleteTask('${t._id}')">Remove</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load tasks', err);
      }
    }

    async function createTask() {
      const title = document.getElementById('taskTitle').value.trim();
      const description = document.getElementById('taskDesc').value.trim();
      if (!title) return showToast('Task title is required', 'error');

      try {
        const res = await fetch(`${TASK_API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentUser._id, title, description })
        });
        
        if (!res.ok) {
          const err = await res.json();
          return showToast(err.error || 'Failed to create task', 'error');
        }
        
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        showToast('Task added successfully!');
        loadIsolatedTasks(); // Reload dashboard
      } catch (err) {
        showToast('Cannot connect to task-service', 'error');
      }
    }

    async function updateTaskStatus(id, status) {
      try {
        await fetch(`${TASK_API}/tasks/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        showToast(`Status updated to ${status}`);
        loadIsolatedTasks();
      } catch (err) {
        showToast('Update failed', 'error');
      }
    }

    async function deleteTask(id) {
      try {
        await fetch(`${TASK_API}/tasks/${id}`, { method: 'DELETE' });
        showToast('Task removed');
        loadIsolatedTasks();
      } catch (err) {
        showToast('Delete failed', 'error');
      }
    }
  </script>
</body>
</html>
